<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special, Ultra-Shining Birthday</title>
    <style>
        /* Base Reset & Cinematic Background */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Tahoma, sans-serif; perspective: 1000px; }
        
        /* High-performance Fireworks Canvas */
        #fireworks-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* The Centered Stage */
        #stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }

        /* Elegant Glowing Button */
        #gift-btn {
            padding: 20px 40px; font-size: 24px; font-weight: 300; letter-spacing: 2px;
            color: #fff; background: transparent; border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 4px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2), inset 0 0 10px rgba(255, 215, 0, 0.1);
            transition: all 0.4s ease; backdrop-filter: blur(5px);
        }
        #gift-btn:hover { background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5), inset 0 0 20px rgba(255, 215, 0, 0.2); border-color: #ffd700; transform: translateY(-2px); }

        /* Frosted Glass Reveal Card */
        #card {
            display: none; flex-direction: column; align-items: center; text-align: center;
            background: rgba(20, 20, 35, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 50px 40px; max-width: 500px; width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            opacity: 0; transform: translateY(30px) rotateX(0) rotateY(0); 
            transition: opacity 1s ease; 
        }
        #card.show { display: flex; opacity: 1; transform: translateY(0); }

        /* ULTRA-SHINING Typography for Happy Birthday */
        h1.shining-birthday { 
            margin: 0 0 15px 0; font-size: 3.5rem; font-weight: 200; 
            /* 1. Base Gold-Brass Gradient */
            background: linear-gradient(to right, #ffd700, #ffaa00, #ffd700); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent;
            position: relative;
            /* 2. Soft, overall text shadow/glow */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* 3. Layered Glint Animation on the Pseudo-Element */
        h1.shining-birthday::after {
            content: 'Happy Birthday';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            /* Multiple layered gradients create a brighter, more complex shine */
            background-image: 
                linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.9) 45%, rgba(255, 255, 255, 1) 50%, rgba(255, 255, 255, 0.9) 55%, transparent 70%),
                linear-gradient(110deg, transparent 35%, rgba(255, 215, 0, 0.8) 50%, transparent 65%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            /* Faster animation and complex gradients mean MORE shining */
            animation: ultraGlintText 2s infinite linear;
            pointer-events: none;
            /* 4. Intensify glow with pseudo-shadow */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        @keyframes ultraGlintText {
            from {
                background-position: -200% center;
            }
            to {
                background-position: 200% center;
            }
        }

        .subtitle { color: #aaa; font-size: 1.2rem; margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; }
        .message { color: #eee; font-size: 1.4rem; line-height: 1.6; margin-bottom: 30px; font-weight: 300; }
        .signature { color: #ffd700; font-size: 1.5rem; font-style: italic; align-self: flex-end; margin-right: 20px; }

        /* Minimalist Cake Icon */
        .cake-icon { font-size: 4rem; margin-bottom: 20px; animation: float 4s ease-in-out infinite; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <div id="stage">
        <button id="gift-btn">Open Present</button>

        <div id="card">
            <div class="cake-icon">🎂</div>
            <h1 class="shining-birthday">Happy Birthday</h1>
            <div class="subtitle">TO SOMEONE TRULY SPECIAL</div>
            <div class="message">
                May this year bring you closer to your dreams and fill your days with beautiful moments. You deserve a celebration as wonderful as you are.
            </div>
            <div class="signature">- [Your Name Here]</div>
        </div>
    </div>

    <script>
        // --- VISUAL ENGINE (unchanged, high performance) ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('gift-btn');
        const card = document.getElementById('card');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        let stardust = [];
        const colors = ['#FFD700', '#FFA500', '#FF4500', '#00FFFF', '#FF00FF'];

        // Stardust Background
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.alpha = Math.random();
                this.fadeDir = Math.random() > 0.5 ? 1 : -1;
                this.speed = Math.random() * 0.2 + 0.1;
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.y = canvas.height;
                this.alpha += 0.01 * this.fadeDir;
                if (this.alpha >= 1 || this.alpha <= 0) this.fadeDir *= -1;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i = 0; i < 100; i++) stardust.push(new Star());

        // Fireworks Particles
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.96; this.gravity = 0.04;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.015;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); 
            }
        }

        function createExplosion(x, y) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 80; i++) particles.push(new Particle(x, y, color));
            playFireworkSound(); 
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'rgba(5, 5, 16, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stardust.forEach(star => { star.update(); star.draw(); });

            if (Math.random() < 0.03 && card.classList.contains('show')) {
                createExplosion(Math.random() * canvas.width, Math.random() * (canvas.height * 0.6));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1; 
        }

        // --- AUDIO ENGINE (unchanged, complex synthesis) ---
        let audioCtx;
        let noiseBuffer;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 2; 
                noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playFireworkSound() {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            oscGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(oscGain); oscGain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);

            const noise = audioCtx.createBufferSource();
            const noiseFilter = audioCtx.createBiquadFilter();
            const noiseGain = audioCtx.createGain();
            noise.buffer = noiseBuffer;
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 2000;
            noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.8);
        }

        function playMagicChime() {
            if (!audioCtx) return;
            const chords = [523.25, 659.25, 783.99, 1046.50]; 
            chords.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 1.5);
                }, i * 150); 
            });
        }

        function playPartyHorn() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 15;
            lfoGain.gain.value = 30;
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.8);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); lfo.start();
            osc.stop(audioCtx.currentTime + 1.2); lfo.stop(audioCtx.currentTime + 1.2);
        }

        // --- INTERACTIONS (unchanged) ---
        document.addEventListener('mousemove', (e) => {
            if (card.classList.contains('show')) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
                card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        btn.addEventListener('click', () => {
            initAudio(); 
            btn.style.display = 'none';
            card.classList.add('show');
            
            playMagicChime();
            setTimeout(playPartyHorn, 600);

            setTimeout(() => createExplosion(canvas.width * 0.2, canvas.height * 0.3), 100);
            setTimeout(() => createExplosion(canvas.width * 0.8, canvas.height * 0.4), 400);
            setTimeout(() => createExplosion(canvas.width * 0.5, canvas.height * 0.2), 700);
            
            animate();
        });

        window.addEventListener('click', (e) => {
            if (card.classList.contains('show')) {
                initAudio();
                createExplosion(e.clientX, e.clientY);
            }
        });
    </script>
</body>
</html>
